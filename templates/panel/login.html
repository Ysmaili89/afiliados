<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel - Login | Filtro Amazon</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amazon+Ember:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Amazon Ember', 'Inter', sans-serif;
            background: #232f3e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 153, 0, 0.05) 0%, transparent 20%),
                              radial-gradient(circle at 90% 80%, rgba(255, 153, 0, 0.05) 0%, transparent 20%);
        }
        
        .login-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 35px 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.4s ease;
            border-top: 4px solid #ff9900;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo-icon {
            width: 80px;
            height: 80px;
            background: #ff9900;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            box-shadow: 0 5px 15px rgba(255, 153, 0, 0.3);
            border: 3px solid #232f3e;
        }
        
        .logo-icon i {
            font-size: 36px;
            color: #232f3e;
        }
        
        .login-header h2 {
            color: #232f3e;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        
        .login-header p {
            color: #565959;
            font-size: 14px;
        }
        
        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid transparent;
        }
        
        .alert-success { background: #d4edda; color: #0f5c2e; border-left-color: #28a745; }
        .alert-danger, .alert-error { background: #f8d7da; color: #a71d2a; border-left-color: #dc3545; }
        
        .form-group { margin-bottom: 22px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #232f3e;
            font-size: 14px;
            font-weight: 600;
        }
        
        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff9900;
            font-size: 16px;
        }
        
        .input-wrapper input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 2px solid #e7e9ec;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s ease;
        }
        
        .input-wrapper input:focus {
            border-color: #ff9900;
            outline: none;
            box-shadow: 0 0 0 3px rgba(255, 153, 0, 0.2);
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to bottom, #ff9900, #e68900);
            color: #232f3e;
            border: 1px solid #e68900;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
        }
        
        .btn-login:hover {
            background: linear-gradient(to bottom, #e68900, #cc7a00);
            transform: translateY(-2px);
        }
        
        .login-footer {
            margin-top: 25px;
            text-align: center;
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #007185;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        
        .amazon-badge {
            margin-top: 15px;
            font-size: 12px;
            color: #565959;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="logo-icon">
                <i class="fas fa-filter"></i>
            </div>
            <h2>Filtro Amazon</h2>
            <p>Accede al panel de control</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        <i class="fas fa-exclamation-circle"></i>
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="form-group">
                <label>Usuario</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="Tu usuario" required autocomplete="username">
                </div>
            </div>
            
            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Tu contraseña" required autocomplete="current-password">
                </div>
            </div>
            
            <button type="submit" class="btn-login">
                <span>Iniciar sesión</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>
        
        <div class="login-footer">
            <a href="/" class="back-link">
                <i class="fas fa-arrow-left"></i> Volver a la tienda
            </a>
            
            <div class="amazon-badge">
                <i class="fab fa-amazon"></i> Sistema Seguro
            </div>
        </div>
    </div>
</body>
</html>
